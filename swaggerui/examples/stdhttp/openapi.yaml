openapi: "3.1.0"
info:
  title: My API
  version: "1.0.0"
  description: A minimal example API served alongside Swagger UI.

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/hello:
    get:
      summary: Say hello
      operationId: getHello
      tags:
        - General
      responses:
        "200":
          description: A greeting message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: hello
